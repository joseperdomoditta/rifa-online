<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa 100 Números</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; max-width: 800px; margin: 20px auto; }
        .btn { padding: 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
        .disponible { background: #4CAF50; color: white; }
        .ocupado { background: #f44336; color: white; cursor: not-allowed; }
        form { display: inline; }
        input { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
    <h1>RIFA 100 NÚMEROS</h1>
    <p>Elige tu número y escribe tu nombre</p>
    <div class="grid">
        {% for n in numeros %}
            {% if n.estado == 'disponible' %}
            <form method="POST" action="/comprar/{{ n.id }}">
                <input type="text" name="nombre" placeholder="Tu nombre" required>
                <button class="btn disponible">{{ n.id }}</button>
            </form>
            {% else %}
                <button class="btn ocupado">{{ n.id }}<br><small>{{ n.comprador }}</small></button>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
